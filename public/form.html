<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share your feedback</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0f14; color: #e8edf2;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px;
  }
  .card { background: #111820; border: 1px solid #263445; border-radius: 14px; padding: 28px; width: 100%; max-width: 540px; }
  h1 { font-size: 20px; color: #4fd1c5; margin-bottom: 6px; }
  p.sub { color: #8b98a5; font-size: 14px; margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #8b98a5; margin: 14px 0 6px; letter-spacing: 1px; text-transform: uppercase; }
  select, textarea {
    width: 100%; background: #0b0f14; color: #e8edf2; border: 1px solid #263445;
    border-radius: 8px; padding: 10px; font-size: 15px; font-family: inherit;
  }
  textarea { min-height: 140px; resize: vertical; }
  button {
    margin-top: 20px; width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: #4fd1c5; color: #06251f; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: default; }
  .msg { margin-top: 14px; font-size: 14px; }
  .ok { color: #23c27f; }
  .err { color: #ff9d95; }
</style>
</head>
<body>
<div class="card">
  <h1>Share your feedback</h1>
  <p class="sub">Takes a minute. It goes straight to the team.</p>
  <form id="f">
    <label for="topic">Topic</label>
    <select id="topic" required>
      <option>Product Experience</option>
      <option>Integrations</option>
      <option>Pricing &amp; Billing</option>
      <option>Support</option>
      <option>Competitive</option>
    </select>
    <label for="body">Your feedback</label>
    <textarea id="body" maxlength="5000" required placeholder="What's working, what isn't, what you need..."></textarea>
    <button id="btn" type="submit">Send feedback</button>
    <div class="msg" id="msg"></div>
  </form>
</div>
<script>
const token = new URLSearchParams(location.search).get("token");
const msg = document.getElementById("msg");
const btn = document.getElementById("btn");
if (!token) { msg.textContent = "This link is missing its token. Please use the link from your email."; msg.className = "msg err"; btn.disabled = true; }
document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  btn.disabled = true;
  msg.textContent = "Sending...";
  msg.className = "msg";
  try {
    const res = await fetch("/api/feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token,
        topic: document.getElementById("topic").value,
        body: document.getElementById("body").value,
      }),
    });
    const data = await res.json();
    if (res.status === 202) {
      msg.textContent = "Thank you. Your feedback is in.";
      msg.className = "msg ok";
      document.getElementById("body").value = "";
    } else {
      msg.textContent = data.error || "Something went wrong.";
      msg.className = "msg err";
      btn.disabled = false;
    }
  } catch {
    msg.textContent = "Network error. Try again.";
    msg.className = "msg err";
    btn.disabled = false;
  }
});
</script>
</body>
</html>
